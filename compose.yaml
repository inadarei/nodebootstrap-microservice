services:
  ms-nodebootstrap-example:
    container_name: ms-nodebootstrap-example
    build:
      context: .
      target: build
    command: sh -c "bun src/migrate.js up && bun --watch src/server.js"
    ports:
      - '5501:5501'
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ms-nodebootstrap-example-db
    depends_on:
      ms-nodebootstrap-example-db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./src
          target: /opt/app/src
        - action: sync
          path: ./migrations
          target: /opt/app/migrations
        - action: rebuild
          path: package.json

  ms-nodebootstrap-example-db:
    container_name: ms-nodebootstrap-example-db
    image: postgres:17-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ms_nb_example_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  ms_nb_example_db_data:
